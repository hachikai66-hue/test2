<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>あそんでまなべる 日本地図パズル - Web版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Start Screen -->
        <div id="start-screen" class="overlay-screen active">
            <div class="menu-card">
                <h1>🗺️ 日本地図パズル</h1>
                <p>都道府県を正しい場所に当てはめよう！</p>
                <div class="mode-selector">
                    <button class="mode-btn" data-mode="beginner">
                        <span class="mode-title">トレーニング</span>
                        <span class="mode-desc">境界線と名前あり</span>
                    </button>
                    <button class="mode-btn" data-mode="normal">
                        <span class="mode-title">ノーマル</span>
                        <span class="mode-desc">境界線あり・名前なし</span>
                    </button>
                    <button class="mode-btn" data-mode="expert">
                        <span class="mode-title">エキスパート</span>
                        <span class="mode-desc">境界線なし・名前なし</span>
                    </button>
                    <button class="mode-btn" data-mode="capitals">
                        <span class="mode-title">県庁所在地</span>
                        <span class="mode-desc">県庁所在地の名前で挑戦</span>
                    </button>
                </div>
                <div class="global-actions">
                    <button id="rank-btn" class="secondary-btn">🏆 ランキング</button>
                    <button id="fullscreen-btn" class="secondary-btn">📺 全画面</button>
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden">
            <header class="game-header">
                <div class="header-left">
                    <button id="back-btn" class="icon-btn">🏠</button>
                    <div class="game-info">
                        <span id="current-mode-label">ノーマル</span>
                        <div id="timer">00:00</div>
                    </div>
                </div>
                <div class="progress-bar-container">
                    <div id="progress-bar" style="width: 0%"></div>
                    <span id="progress-text">0 / 47</span>
                </div>
                <div class="header-right">
                    <button id="voice-toggle" class="icon-btn" title="読み上げON/OFF">🔊</button>
                    <button id="zoom-in" class="icon-btn">+</button>
                    <button id="zoom-out" class="icon-btn">-</button>
                </div>
            </header>

            <main id="game-viewport">
                <div id="map-world">
                    <!-- The SVG Map will be injected here -->
                    <svg id="game-svg" viewBox="0 0 1000 1000">
                        <defs>
                            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
                                <feOffset dx="2" dy="2" result="offsetblur" />
                                <feComponentTransfer>
                                    <feFuncA type="linear" slope="0.3" />
                                </feComponentTransfer>
                                <feMerge>
                                    <feMergeNode />
                                    <feMergeNode in="SourceGraphic" />
                                </feMerge>
                            </filter>
                        </defs>
                        <g id="map-camera">
                            <g id="map-base"></g>
                            <g id="map-targets"></g>
                            <g id="map-pieces"></g>
                        </g>
                    </svg>
                </div>
            </main>

            <div class="tray-wrapper">
                <button id="tray-prev" class="tray-arrow">◀</button>
                <footer id="tray-container" class="piece-tray">
                    <!-- Draggable pieces go here -->
                </footer>
                <button id="tray-next" class="tray-arrow">▶</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="overlay-screen hidden">
            <div class="result-card">
                <h2>🎉 クリア！</h2>
                <div class="result-stats">
                    <div class="stat-item">
                        <label>タイム</label>
                        <span id="final-time">02:30</span>
                    </div>
                    <div class="stat-item">
                        <label>ランク</label>
                        <span id="final-rank">S</span>
                    </div>
                </div>
                <div id="reward-panel" class="reward-panel">
                    <!-- Panels earned -->
                </div>
                <div class="result-actions">
                    <button id="retry-btn" class="primary-btn">もういちど</button>
                    <button id="result-home-btn" class="secondary-btn">ホームへ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden audio elements -->
    <audio id="se-snap" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="se-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script src="app.js"></script>
</body>
</html>
